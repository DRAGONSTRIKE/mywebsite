# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/

# Appearance — light by default for the editorial portfolio look
appearance:
  mode: light
  color: stone   # editorial neutral; falls back to default if not built-in

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ''
    org_name: 'Haokun Wang'
    description: 'Haokun Wang — UX Researcher and AR/VR interaction designer. Wearable haptics, multisensory feedback, and user studies published at CHI, UIST, IEEE VR, ISMAR.'
    twitter: ''
  analytics:
    google_analytics: ''
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: ''
    baidu: ''

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    fixed_to_top: true
    show_search: false
    show_theme_chooser: true
    logo:
      text: "Haokun Wang"

# Site footer
footer:
  copyright:
    notice: '© {year} Haokun Wang. Designed and built by hand.'
    license:
      enable: false
      allow_derivatives: false
      share_alike: true
      allow_commercial: false

# Localization
locale:
  date_format: 'Jan 2006'
  time_format: '3:04 PM'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: false
